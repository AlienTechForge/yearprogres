name: DB Diagnose

on:
  workflow_dispatch:
    inputs:
      progress_id:
        description: Custom progress id to inspect
        required: true
        default: m8bcrJVa

permissions:
  contents: read
  packages: read

jobs:
  diagnose:
    runs-on: self-hosted
    env:
      CONTAINER_NAME: yp-app
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      PROGRESS_ID: ${{ inputs.progress_id }}
    steps:
      - name: Inspect containers and app DB target
        shell: bash
        run: |
          set -euo pipefail

          echo "### docker containers"
          docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}\t{{.Networks}}'

          echo
          echo "### app DB env"
          docker inspect "${CONTAINER_NAME}" --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep -E '^(DB_HOST|DB_PORT|DB_USER|DB_NAME|NEXT_PUBLIC_URL)=' \
            | sort

          echo
          echo "### app network hosts"
          docker exec "${CONTAINER_NAME}" getent hosts mysql || true

          echo
          echo "### mysql network attachment"
          docker inspect mysql --format '{{json .NetworkSettings.Networks}}' || true

      - name: Query progress record from mysql container
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DB_USER}" ] || [ -z "${DB_PASSWORD}" ] || [ -z "${DB_NAME}" ]; then
            echo "::error::Missing DB secrets"
            exit 1
          fi

          if ! [[ "${PROGRESS_ID}" =~ ^[A-Za-z0-9_-]{1,64}$ ]]; then
            echo "::error::Invalid progress id"
            exit 1
          fi

          docker exec \
            -e MYSQL_PWD="${DB_PASSWORD}" \
            mysql mysql \
            -h127.0.0.1 \
            -P3306 \
            -u"${DB_USER}" \
            --database="${DB_NAME}" \
            --table \
            -e "
              SELECT @@hostname AS mysql_hostname, @@port AS mysql_port, DATABASE() AS database_name, CURRENT_USER() AS current_user_name;
              SELECT id, name, start_time, end_time, created_at, created_by_ip
              FROM custom_progress_bars
              WHERE id = '${PROGRESS_ID}';
              SELECT COUNT(*) AS total_custom_progress_bars
              FROM custom_progress_bars;
            "
