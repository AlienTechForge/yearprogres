name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/alientechforge/yearprogres
  NEXT_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_URL || 'https://yearprogres.azndev.com' }}

jobs:
  ci:
    name: Lint, type-check, build
    runs-on: ubuntu-latest
    env:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: YearProgres
      DB_PASSWORD: ci-placeholder
      DB_NAME: YearProgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

  image:
    name: Build and push GHCR image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_URL=${{ env.NEXT_PUBLIC_URL }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: image
    if: github.ref == 'refs/heads/master'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      IMAGE_REF: ghcr.io/alientechforge/yearprogres:${{ github.sha }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
    steps:
      - name: Validate deploy configuration
        run: |
          set -euo pipefail

          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DB_USER"
          test -n "$DB_PASSWORD"
          test -n "$DB_NAME"

      - name: Deploy over SSH
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" <<EOF
          set -euo pipefail

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          docker network create MySql >/dev/null 2>&1 || true
          docker network connect MySql mysql >/dev/null 2>&1 || true
          docker pull "$IMAGE_REF"
          docker rm -f yp-app >/dev/null 2>&1 || true
          docker run -d \
            --name yp-app \
            --restart=unless-stopped \
            --network MySql \
            -p 4001:3000 \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_URL="$NEXT_PUBLIC_URL" \
            -e DB_HOST=mysql \
            -e DB_PORT=3306 \
            -e DB_USER="$DB_USER" \
            -e DB_PASSWORD="$DB_PASSWORD" \
            -e DB_NAME="$DB_NAME" \
            "$IMAGE_REF"
          EOF
