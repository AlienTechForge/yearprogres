name: CI/CD

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alientechforge/yearprogres
  NEXT_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_URL || 'https://yearprogres.azndev.com' }}

jobs:
  ci:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    env:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: YearProgres
      DB_PASSWORD: ci-placeholder
      DB_NAME: YearProgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

  image:
    name: Build and push GHCR image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_URL=${{ env.NEXT_PUBLIC_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: image
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || vars.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || vars.GHCR_USERNAME || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
      IMAGE_REF: ghcr.io/alientechforge/yearprogres:sha-${{ github.sha }}
      DB_USER: ${{ secrets.DB_USER || vars.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME || vars.DB_NAME }}
    steps:
      - name: Check deploy configuration
        id: deploy_config
        run: |
          set -euo pipefail

          missing=()

          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DB_USER DB_PASSWORD DB_NAME; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "### Deployment skipped"
              echo
              echo "The GHCR image was built and pushed, but SSH deployment was skipped because these settings are missing:"
              printf -- "- \`%s\`\n" "${missing[@]}"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        if: steps.deploy_config.outputs.configured == 'true'
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" <<EOF
          set -euo pipefail

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          docker network create MySql >/dev/null 2>&1 || true
          docker network connect MySql mysql >/dev/null 2>&1 || true
          docker pull "$IMAGE_REF"
          docker rm -f yp-app >/dev/null 2>&1 || true
          docker run -d \
            --name yp-app \
            --restart=unless-stopped \
            --network MySql \
            -p 4001:3000 \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_URL="$NEXT_PUBLIC_URL" \
            -e DB_HOST=mysql \
            -e DB_PORT=3306 \
            -e DB_USER="$DB_USER" \
            -e DB_PASSWORD="$DB_PASSWORD" \
            -e DB_NAME="$DB_NAME" \
            "$IMAGE_REF"
          EOF
