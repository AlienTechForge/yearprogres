name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/alientechforge/yearprogres
  CONTAINER_NAME: yp-app
  NEXT_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_URL || 'https://yearprogres.azndev.com' }}

jobs:
  ci:
    name: Lint, type-check, build
    runs-on: ubuntu-latest
    env:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: YearProgres
      DB_PASSWORD: ci-placeholder
      DB_NAME: YearProgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

  image:
    name: Build and push GHCR image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_URL=${{ env.NEXT_PUBLIC_URL }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on self-hosted
    runs-on: self-hosted
    needs: image
    if: github.ref == 'refs/heads/master'
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DOCKER_NETWORK: ${{ vars.DOCKER_NETWORK || 'MySql' }}
      HOST_PORT: ${{ vars.HOST_PORT || '4001' }}
    steps:
      - name: Validate secrets
        shell: bash
        run: |
          missing=0
          for var in DB_USER DB_PASSWORD DB_NAME; do
            if [ -z "${!var}" ]; then
              echo "::error::缺少必要 secret：${var}"
              missing=1
            fi
          done
          [ "${missing}" -eq 0 ]

      - name: Login GHCR on host
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull new image
        shell: bash
        run: docker pull "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Ensure docker network
        shell: bash
        run: |
          docker network create "${DOCKER_NETWORK}" 2>/dev/null || true
          docker network connect "${DOCKER_NETWORK}" mysql 2>/dev/null || true

      - name: Stop old container
        shell: bash
        run: |
          docker stop "${CONTAINER_NAME}" 2>/dev/null || true
          docker rm "${CONTAINER_NAME}" 2>/dev/null || true

      - name: Run new container
        shell: bash
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart=unless-stopped \
            --network "${DOCKER_NETWORK}" \
            -p "${HOST_PORT}:3000" \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_URL="${NEXT_PUBLIC_URL}" \
            -e DB_HOST=mysql \
            -e DB_PORT=3306 \
            -e DB_USER="${DB_USER}" \
            -e DB_PASSWORD="${DB_PASSWORD}" \
            -e DB_NAME="${DB_NAME}" \
            "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Health check + rollback
        shell: bash
        run: |
          sleep 20
          docker ps -a --filter "name=^/${CONTAINER_NAME}$"
          echo "----- logs -----"
          docker logs --tail=200 "${CONTAINER_NAME}" || true
          echo "----------------"

          if docker ps --filter "name=^/${CONTAINER_NAME}$" --filter "status=running" --format '{{.Names}}' | grep -qx "${CONTAINER_NAME}"; then
            restart_count="$(docker inspect -f '{{.RestartCount}}' "${CONTAINER_NAME}")"
            if [ "${restart_count}" = "0" ]; then
              exit 0
            fi
            echo "::error::容器有重啟紀錄，RestartCount=${restart_count}"
          fi

          echo "新容器未正常執行，回滾到 latest"
          docker rm -f "${CONTAINER_NAME}" || true
          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart=unless-stopped \
            --network "${DOCKER_NETWORK}" \
            -p "${HOST_PORT}:3000" \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_URL="${NEXT_PUBLIC_URL}" \
            -e DB_HOST=mysql \
            -e DB_PORT=3306 \
            -e DB_USER="${DB_USER}" \
            -e DB_PASSWORD="${DB_PASSWORD}" \
            -e DB_NAME="${DB_NAME}" \
            "${IMAGE_NAME}:latest"

          sleep 10
          docker ps --filter "name=^/${CONTAINER_NAME}$"
          exit 1
