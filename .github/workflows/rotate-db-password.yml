name: Rotate DB Password

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CONTAINER_NAME: yp-app
  NEXT_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_URL || 'https://yearprogres.azndev.com' }}

jobs:
  rotate:
    name: Rotate MySQL app password
    runs-on: self-hosted
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_PASSWORD_NEXT: ${{ secrets.DB_PASSWORD_NEXT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DOCKER_NETWORK: ${{ vars.DOCKER_NETWORK || 'MySql' }}
      HOST_PORT: ${{ vars.HOST_PORT || '4001' }}
    steps:
      - name: Validate secrets
        shell: bash
        run: |
          missing=0
          for var in DB_USER DB_PASSWORD DB_PASSWORD_NEXT DB_NAME; do
            if [ -z "${!var}" ]; then
              echo "::error::缺少必要 secret：${var}"
              missing=1
            fi
          done

          if ! [[ "${DB_PASSWORD_NEXT}" =~ ^[A-Za-z0-9_-]{40,80}$ ]]; then
            echo "::error::DB_PASSWORD_NEXT 格式不符合安全限制"
            missing=1
          fi

          [ "${missing}" -eq 0 ]

      - name: Rotate database password
        shell: bash
        run: |
          set -euo pipefail

          mysql_exec() {
            local password="$1"
            shift
            docker exec -e MYSQL_PWD="${password}" mysql \
              mysql \
              --protocol=TCP \
              -h127.0.0.1 \
              -P3306 \
              -u"${DB_USER}" \
              "${DB_NAME}" \
              "$@"
          }

          if mysql_exec "${DB_PASSWORD}" -e "SELECT 1" >/dev/null 2>&1; then
            mysql_exec "${DB_PASSWORD}" -e "ALTER USER USER() IDENTIFIED BY '${DB_PASSWORD_NEXT}';"
          elif mysql_exec "${DB_PASSWORD_NEXT}" -e "SELECT 1" >/dev/null 2>&1; then
            echo "Database password already rotated."
          else
            echo "::error::Cannot authenticate with current or next DB password."
            exit 1
          fi

          mysql_exec "${DB_PASSWORD_NEXT}" -e "SELECT 1" >/dev/null

      - name: Restart app with rotated password
        shell: bash
        run: |
          set -euo pipefail

          image="$(docker inspect -f '{{.Config.Image}}' "${CONTAINER_NAME}")"
          docker network create "${DOCKER_NETWORK}" 2>/dev/null || true
          docker network connect "${DOCKER_NETWORK}" mysql 2>/dev/null || true

          docker rm -f "${CONTAINER_NAME}" 2>/dev/null || true
          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart=unless-stopped \
            --network "${DOCKER_NETWORK}" \
            -p "${HOST_PORT}:3000" \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_URL="${NEXT_PUBLIC_URL}" \
            -e DB_HOST=mysql \
            -e DB_PORT=3306 \
            -e DB_USER="${DB_USER}" \
            -e DB_PASSWORD="${DB_PASSWORD_NEXT}" \
            -e DB_NAME="${DB_NAME}" \
            "${image}"

          sleep 20
          curl -fsS "http://127.0.0.1:${HOST_PORT}/api/health" >/dev/null
          docker exec -e MYSQL_PWD="${DB_PASSWORD_NEXT}" mysql \
            mysql \
            --protocol=TCP \
            -h127.0.0.1 \
            -P3306 \
            -u"${DB_USER}" \
            "${DB_NAME}" \
            -e "SELECT 1" >/dev/null
